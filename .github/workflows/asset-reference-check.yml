name: asset-reference-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check referenced assets exist
        run: python scripts/check_asset_references.py
