<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Samuel | alard.se</title>
  <meta name="description" content="Samuels sida med coola bilar.">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div class="subpage-shell">
    <aside class="side-boxes">
      <div class="side-box"><span>Min Youtube</span></div>
      <a class="side-box side-link" href="/samuel/bilar/"><span>Bilar</span></a>
    </aside>

    <main class="wrap">
      <div class="title-image-wrap">
        <img src="/assets/sammycraft.png" alt="Samuels sida" class="title-image">
      </div>
      <p class="link-row">
        <button class="fun-link" id="open-video" type="button">Min flickvän</button>
      </p>
    </main>
  </div>

  <dialog id="video-modal" class="video-modal">
    <button class="close-video" id="close-video" type="button">Stäng</button>
    <div class="video-wrap">
      <iframe
        id="rickroll-frame"
        src=""
        title="Video"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </dialog>

  <script>
    const openBtn = document.getElementById("open-video");
    const closeBtn = document.getElementById("close-video");
    const modal = document.getElementById("video-modal");
    const frame = document.getElementById("rickroll-frame");
    const videoUrl = "https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=1&rel=0";

    openBtn.addEventListener("click", () => {
      frame.src = videoUrl;
      modal.showModal();
    });

    closeBtn.addEventListener("click", () => {
      modal.close();
      frame.src = "";
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.close();
        frame.src = "";
      }
    });
  </script>
  <div class="mc-anim-layer" aria-hidden="true">
    <div class="mc-chicken" id="mc-chicken" title="Minecraft-kyckling">
      <model-viewer
        src="/assets/minecraft_-_chicken.glb"
        orientation="0deg 0deg 0deg"
        scale="0.12 0.12 0.12"
        camera-controls
        disable-pan
        disable-zoom
        camera-orbit="20deg 68deg 5.2m"
        min-camera-orbit="20deg 68deg 5.2m"
        max-camera-orbit="20deg 68deg 5.2m"
        field-of-view="34deg"
        interaction-prompt="none"
        shadow-intensity="0.8"
        exposure="1"
        alt="Kyckling 3D modell">
      </model-viewer>
    </div>
    <div class="mc-steve" id="mc-steve" title="Steve">
      <model-viewer
        src="/assets/minecraft_-_steve.glb"
        orientation="0deg 0deg 0deg"
        scale="0.1 0.1 0.1"
        autoplay
        camera-controls
        disable-pan
        disable-zoom
        camera-orbit="18deg 68deg 6.4m"
        min-camera-orbit="18deg 68deg 6.4m"
        max-camera-orbit="18deg 68deg 6.4m"
        field-of-view="34deg"
        interaction-prompt="none"
        shadow-intensity="0.8"
        exposure="1"
        alt="Steve 3D modell">
      </model-viewer>
    </div>
  </div>
  <button class="mob-zombie-rider" id="mob-zombie-rider" type="button" aria-label="Zombie rider">
    <model-viewer
      src="/assets/minecraft_chicken_jockey.glb"
      orientation="180deg 180deg 135deg"
      scale="1 1 1"
      autoplay
      camera-controls
      disable-pan
      disable-zoom
      camera-orbit="20deg 68deg 2.2m"
      min-camera-orbit="20deg 68deg 2.2m"
      max-camera-orbit="20deg 68deg 2.2m"
      field-of-view="32deg"
      interaction-prompt="none"
      shadow-intensity="0.8"
      exposure="1"
      alt="Zombie på kyckling 3D modell">
    </model-viewer>
  </button>

  <script>
    (() => {
      const steve = document.getElementById("mc-steve");
      const chicken = document.getElementById("mc-chicken");
      const layer = document.querySelector(".mc-anim-layer");
      let mouseX = window.innerWidth * 0.5;
      let mouseY = window.innerHeight * 0.75;
      if (!steve || !chicken || !layer) return;

      const extraChickens = [];
      for (let i = 0; i < 10; i += 1) {
        const extra = document.createElement("div");
        extra.className = "mc-chicken mc-chicken-extra";
        extra.title = `Kyckling ${i + 2}`;
        extra.innerHTML = `
          <model-viewer
            src="/assets/minecraft_-_chicken.glb"
            orientation="0deg 0deg 0deg"
            scale="0.11 0.11 0.11"
            camera-controls
            disable-pan
            disable-zoom
            camera-orbit="20deg 68deg 5.2m"
            min-camera-orbit="20deg 68deg 5.2m"
            max-camera-orbit="20deg 68deg 5.2m"
            field-of-view="34deg"
            interaction-prompt="none"
            shadow-intensity="0.8"
            exposure="1"
            alt="Kyckling 3D modell">
          </model-viewer>
        `;
        layer.appendChild(extra);
        extraChickens.push(extra);
      }

      const actors = [
        { el: steve, x: window.innerWidth * 0.7, y: 10, vx: -3.2, vy: 0, max: 6.2, avoid: 80, steer: 0.16, minY: 4, maxY: 82, walker: true },
        { el: chicken, x: window.innerWidth * 0.2, y: 48, vx: 1.6, vy: 0, max: 4.9, avoid: 150, steer: 0.42, minY: 8, maxY: 64, walker: true }
      ];
      extraChickens.forEach((extra, idx) => {
        actors.push({
          el: extra,
          x: 18 + (idx % 5) * 24,
          y: 10 + Math.floor(idx / 5) * 18,
          vx: 1.1 + idx * 0.08,
          vy: 0,
          max: 3.8,
          avoid: 110,
          steer: 0.25,
          minY: 6,
          maxY: 74,
          walker: true
        });
      });

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function tickActors() {
        const maxX = window.innerWidth - 40;
        const minX = -180;
        const minYDefault = 6;
        const maxYDefault = 80;

        for (const a of actors) {
          const rect = a.el.getBoundingClientRect();
          const cx = a.x + rect.width * 0.5;
          const cy = window.innerHeight - 280 + a.y + rect.height * 0.5;
          const dx = mouseX - cx;
          const dy = mouseY - cy;
          const dist = Math.hypot(dx, dy);

          if (dist < a.avoid) {
            const push = (a.avoid - dist) / a.avoid;
            a.vx -= (dx / (dist || 1)) * (a.steer + push * 0.55);
            a.vy -= (dy / (dist || 1)) * (a.steer * 0.22 + push * 0.25);
          } else {
            if (a.walker) {
              a.vx += Math.sin(Date.now() / 1900) * 0.03;
              a.vy += Math.cos(Date.now() / 850 + a.x * 0.02) * 0.008;
            } else {
              a.vx += Math.sin(Date.now() / 900 + a.x * 0.003) * 0.03;
              a.vy += Math.cos(Date.now() / 1050 + a.y * 0.02) * 0.02;
            }
          }

          const speed = Math.hypot(a.vx, a.vy);
          if (speed > a.max) {
            a.vx = (a.vx / speed) * a.max;
            a.vy = (a.vy / speed) * a.max;
          }

          a.vx *= 0.95;
          a.vy *= 0.92;
          a.x += a.vx;
          a.y += a.vy;

          const minY = a.minY ?? minYDefault;
          const maxY = a.maxY ?? maxYDefault;
          if (a.x < minX || a.x > maxX) a.vx *= -1;
          if (a.y < minY || a.y > maxY) a.vy *= -1;
          a.x = clamp(a.x, minX, maxX);
          a.y = clamp(a.y, minY, maxY);

          a.el.style.left = `${a.x}px`;
          a.el.style.bottom = `${a.y}px`;
          if (a.walker) {
            const dir = a.vx >= 0 ? -1 : 1;
            const bob = Math.sin(Date.now() / 120) * 2.2;
            a.el.style.transform = `translateY(${bob}px) scaleX(${dir})`;
          }

          // Keep camera fixed so models stay fully visible.
        }
        requestAnimationFrame(tickActors);
      }

      window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      }, { passive: true });

      requestAnimationFrame(tickActors);
    })();

    (() => {
      const mob = document.getElementById("mob-zombie-rider");
      const mobModel = mob?.querySelector("model-viewer");
      if (!mob) return;
      const debug3d = new URLSearchParams(window.location.search).get("debug3d") === "1";
      let yaw = 0;
      let pitch = 66;
      let roll = 0;

      const state = {
        x: Math.max(120, window.innerWidth * 0.78),
        y: Math.max(140, window.innerHeight * 0.72),
        vx: 0,
        vy: 0,
        targetX: 0,
        targetY: 0,
        attackX: null,
        attackY: null,
        attacking: false,
        t: 0
      };

      const mobW = 170;
      const mobH = 180;
      const avoidRadius = 240;

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function place() {
        state.x = clamp(state.x, 0, window.innerWidth - mobW);
        state.y = clamp(state.y, 0, window.innerHeight - mobH);
        mob.style.left = state.x + "px";
        mob.style.top = state.y + "px";
      }

      function pointerMove(e) {
        state.targetX = e.clientX;
        state.targetY = e.clientY;
      }

      function tick() {
        state.t += 0.016;
        const cx = state.x + mobW / 2;
        const cy = state.y + mobH / 2;
        const lookDx = state.targetX - cx;
        const lookDy = state.targetY - cy;
        const lookDeg = (Math.atan2(lookDy, lookDx) * 180) / Math.PI + 90;
        const normalizedDeg = ((lookDeg % 360) + 360) % 360;
        if (!debug3d) yaw = normalizedDeg;
        if (mobModel && debug3d) {
          mobModel.setAttribute("orientation", `${roll.toFixed(1)}deg ${yaw.toFixed(1)}deg 0deg`);
          mobModel.setAttribute("camera-orbit", `${yaw.toFixed(1)}deg ${pitch.toFixed(1)}deg 8m`);
          mobModel.setAttribute("field-of-view", "42deg");
        }

        if (state.attacking && state.attackX !== null && state.attackY !== null) {
          const dx = state.attackX - cx;
          const dy = state.attackY - cy;
          const dist = Math.hypot(dx, dy);
          const accel = 1.35;
          const maxSpeed = 14;

          if (dist < 18) {
            state.attacking = false;
            mob.classList.remove("is-attacking");
          } else {
            state.vx += (dx / (dist || 1)) * accel;
            state.vy += (dy / (dist || 1)) * accel;
            const speed = Math.hypot(state.vx, state.vy);
            if (speed > maxSpeed) {
              state.vx = (state.vx / speed) * maxSpeed;
              state.vy = (state.vy / speed) * maxSpeed;
            }
          }
        } else {
          const dx = cx - state.targetX;
          const dy = cy - state.targetY;
          const dist = Math.hypot(dx, dy);

          if (dist < avoidRadius) {
            const panic = (avoidRadius - dist) / avoidRadius;
            const steer = 1.1 + panic * 1.9;
            state.vx += (dx / (dist || 1)) * steer;
            state.vy += (dy / (dist || 1)) * steer;
          } else {
            state.vx += Math.sin(state.t * 1.2) * 0.08;
            state.vy += Math.cos(state.t * 1.0) * 0.06;
          }

          const roamMax = 5.6;
          const roamSpeed = Math.hypot(state.vx, state.vy);
          if (roamSpeed > roamMax) {
            state.vx = (state.vx / roamSpeed) * roamMax;
            state.vy = (state.vy / roamSpeed) * roamMax;
          }
        }

        state.vx *= 0.92;
        state.vy *= 0.92;
        state.x += state.vx;
        state.y += state.vy;

        place();
        if (mobModel) {
          const dir = state.vx >= 0 ? -1 : 1;
          const bob = Math.sin(state.t * 13) * 2.2;
          mobModel.style.transform = `translateY(${bob}px) scaleX(${dir})`;
        }
        requestAnimationFrame(tick);
      }

      mob.addEventListener("click", (e) => {
        e.preventDefault();
        state.attacking = true;
        state.attackX = state.targetX || window.innerWidth * 0.5;
        state.attackY = state.targetY || window.innerHeight * 0.5;
        mob.classList.add("is-attacking");
        mob.classList.remove("is-clicked");
        // restart click animation cleanly on repeated clicks
        void mob.offsetWidth;
        mob.classList.add("is-clicked");
        window.setTimeout(() => mob.classList.remove("is-clicked"), 360);
      });

      window.addEventListener("mousemove", pointerMove, { passive: true });
      if (debug3d) {
        window.addEventListener("keydown", (e) => {
          if (e.key === "ArrowLeft") yaw -= 5;
          if (e.key === "ArrowRight") yaw += 5;
          if (e.key === "ArrowUp") pitch = Math.max(40, pitch - 2);
          if (e.key === "ArrowDown") pitch = Math.min(85, pitch + 2);
          if (e.key === "[") roll -= 5;
          if (e.key === "]") roll += 5;
        });
      }
      window.addEventListener("resize", place);
      place();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
