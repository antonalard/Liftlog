<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Samuel | alard.se</title>
  <meta name="description" content="Samuels sida med coola bilar.">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div class="subpage-shell">
    <aside class="side-boxes">
      <div class="side-box"><span>Min Youtube</span></div>
      <a class="side-box side-link" href="/samuel/bilar/"><span>Bilar</span></a>
    </aside>

    <main class="wrap">
      <div class="title-image-wrap">
        <img src="/assets/sammycraft.png" alt="Samuels sida" class="title-image">
      </div>
      <p class="link-row">
        <button class="fun-link" id="open-video" type="button">Min flickvän</button>
      </p>
    </main>
  </div>

  <dialog id="video-modal" class="video-modal">
    <button class="close-video" id="close-video" type="button">Stäng</button>
    <div class="video-wrap">
      <iframe
        id="rickroll-frame"
        src=""
        title="Video"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </dialog>

  <script>
    const openBtn = document.getElementById("open-video");
    const closeBtn = document.getElementById("close-video");
    const modal = document.getElementById("video-modal");
    const frame = document.getElementById("rickroll-frame");
    const videoUrl = "https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=1&rel=0";

    openBtn.addEventListener("click", () => {
      frame.src = videoUrl;
      modal.showModal();
    });

    closeBtn.addEventListener("click", () => {
      modal.close();
      frame.src = "";
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.close();
        frame.src = "";
      }
    });
  </script>
  <div class="mc-anim-layer" aria-hidden="true">
    <div class="mc-chicken" title="Minecraft-kyckling">
      <model-viewer
        src="/assets/chicken_blocky.glb"
        auto-rotate
        camera-controls
        disable-pan
        interaction-prompt="none"
        shadow-intensity="0.8"
        exposure="1"
        alt="Kyckling 3D modell">
      </model-viewer>
    </div>
    <div class="mc-steve" title="Steve">
      <model-viewer
        src="/assets/minecraft_-_steve.glb"
        auto-rotate
        camera-controls
        disable-pan
        interaction-prompt="none"
        shadow-intensity="0.8"
        exposure="1"
        alt="Steve 3D modell">
      </model-viewer>
    </div>
  </div>
  <button class="mob-zombie-rider" id="mob-zombie-rider" type="button" aria-label="Zombie rider">
    <model-viewer
      src="/assets/zombie_on_chicken_blocky_upright.glb"
      camera-controls
      disable-pan
      auto-rotate
      interaction-prompt="none"
      shadow-intensity="0.8"
      exposure="1"
      alt="Zombie på kyckling 3D modell">
    </model-viewer>
  </button>

  <script>
    (() => {
      const mob = document.getElementById("mob-zombie-rider");
      if (!mob) return;

      const state = {
        x: Math.max(120, window.innerWidth * 0.78),
        y: Math.max(140, window.innerHeight * 0.72),
        vx: 0,
        vy: 0,
        targetX: 0,
        targetY: 0,
        attackX: null,
        attackY: null,
        attacking: false,
        t: 0
      };

      const mobW = 170;
      const mobH = 180;
      const avoidRadius = 240;

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function place() {
        state.x = clamp(state.x, 0, window.innerWidth - mobW);
        state.y = clamp(state.y, 0, window.innerHeight - mobH);
        mob.style.left = state.x + "px";
        mob.style.top = state.y + "px";
      }

      function pointerMove(e) {
        state.targetX = e.clientX;
        state.targetY = e.clientY;
      }

      function tick() {
        state.t += 0.016;
        const cx = state.x + mobW / 2;
        const cy = state.y + mobH / 2;

        if (state.attacking && state.attackX !== null && state.attackY !== null) {
          const dx = state.attackX - cx;
          const dy = state.attackY - cy;
          const dist = Math.hypot(dx, dy);
          const accel = 1.35;
          const maxSpeed = 14;

          if (dist < 18) {
            state.attacking = false;
            mob.classList.remove("is-attacking");
          } else {
            state.vx += (dx / (dist || 1)) * accel;
            state.vy += (dy / (dist || 1)) * accel;
            const speed = Math.hypot(state.vx, state.vy);
            if (speed > maxSpeed) {
              state.vx = (state.vx / speed) * maxSpeed;
              state.vy = (state.vy / speed) * maxSpeed;
            }
          }
        } else {
          const dx = cx - state.targetX;
          const dy = cy - state.targetY;
          const dist = Math.hypot(dx, dy);

          if (dist < avoidRadius) {
            const panic = (avoidRadius - dist) / avoidRadius;
            const steer = 1.1 + panic * 1.9;
            state.vx += (dx / (dist || 1)) * steer;
            state.vy += (dy / (dist || 1)) * steer;
          } else {
            state.vx += Math.sin(state.t * 1.2) * 0.08;
            state.vy += Math.cos(state.t * 1.0) * 0.06;
          }

          const roamMax = 5.6;
          const roamSpeed = Math.hypot(state.vx, state.vy);
          if (roamSpeed > roamMax) {
            state.vx = (state.vx / roamSpeed) * roamMax;
            state.vy = (state.vy / roamSpeed) * roamMax;
          }
        }

        state.vx *= 0.92;
        state.vy *= 0.92;
        state.x += state.vx;
        state.y += state.vy;

        place();
        requestAnimationFrame(tick);
      }

      mob.addEventListener("click", (e) => {
        e.preventDefault();
        state.attacking = true;
        state.attackX = state.targetX || window.innerWidth * 0.5;
        state.attackY = state.targetY || window.innerHeight * 0.5;
        mob.classList.add("is-attacking");
      });

      window.addEventListener("mousemove", pointerMove, { passive: true });
      window.addEventListener("resize", place);
      place();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
