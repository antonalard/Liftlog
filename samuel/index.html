<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Samuel | alard.se</title>
  <meta name="description" content="Samuels sida med coola bilar.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="subpage-shell">
    <aside class="side-boxes">
      <div class="side-box"><span>Min Youtube</span></div>
    </aside>

    <main class="wrap">
      <h1>Samuels sida</h1>
      <section class="gallery">
        <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?auto=format&fit=crop&w=1200&q=80" alt="Lamborghini i solnedgång">
        <img src="https://images.unsplash.com/photo-1621135802920-133df287f89c?auto=format&fit=crop&w=1200&q=80" alt="Orange Lamborghini">
        <img src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&w=1200&q=80" alt="Ferrari sportbil">
      </section>
      <p class="link-row">
        <button class="fun-link" id="open-video" type="button">Min flickvän</button>
      </p>
    </main>
  </div>

  <dialog id="video-modal" class="video-modal">
    <button class="close-video" id="close-video" type="button">Stäng</button>
    <div class="video-wrap">
      <iframe
        id="rickroll-frame"
        src=""
        title="Video"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </dialog>

  <script>
    const openBtn = document.getElementById("open-video");
    const closeBtn = document.getElementById("close-video");
    const modal = document.getElementById("video-modal");
    const frame = document.getElementById("rickroll-frame");
    const videoUrl = "https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=1&rel=0";

    openBtn.addEventListener("click", () => {
      frame.src = videoUrl;
      modal.showModal();
    });

    closeBtn.addEventListener("click", () => {
      modal.close();
      frame.src = "";
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.close();
        frame.src = "";
      }
    });
  </script>
  <div class="mc-anim-layer" aria-hidden="true">
    <div class="mc-chicken" title="Minecraft-kyckling"></div>
    <div class="mc-steve" title="Steve"></div>
  </div>
</body>
</html>
