<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bilar | Samuel</title>
  <meta name="description" content="Samuels bilsida.">
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <div class="page">
    <header class="hero">
      <a class="back" href="/samuel/">Tillbaka</a>
      <h1>Bilar</h1>
      <p>100 supersportbilar.</p>
    </header>

    <main class="gallery" id="supercar-gallery"></main>
  </div>

  <dialog id="car-lightbox" class="car-lightbox">
    <button type="button" id="close-lightbox" class="close-lightbox">Stäng</button>
    <img id="lightbox-image" src="" alt="">
    <p id="lightbox-title"></p>
  </dialog>

  <script>
    const supercars = Array.from({ length: 100 }, (_, i) => `Supersportbil ${i + 1}`);

    const gallery = document.getElementById("supercar-gallery");
    const lightbox = document.getElementById("car-lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const lightboxTitle = document.getElementById("lightbox-title");
    const closeLightboxBtn = document.getElementById("close-lightbox");

    const carImages = [
      "https://images.unsplash.com/photo-1511919884226-fd3cad34687c?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1621135802920-133df287f89c?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1493238792000-8113da705763?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1553440569-bcc63803a83d?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1502877338535-766e1452684a?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1484136063621-1acbc3f8e36e?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1502161254066-6c74afbf07aa?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1489824904134-891ab64532f1?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1532581140115-3e355d1ed1de?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1507136566006-cfc505b114fc?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1619405399517-d7fce0f13302?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1563720223185-11003d516935?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1542282088-72c9c27ed0cd?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1517524206127-48bbd363f3d7?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1592853625511-adf1f8c3de9a?auto=format&fit=crop&w=1600&q=80",
      "https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&w=1600&q=80"
    ];

    supercars.forEach((name, i) => {
      const card = document.createElement("figure");
      card.className = "card";

      const img = document.createElement("img");
      img.loading = "lazy";
      img.decoding = "async";
      img.src = carImages[i % carImages.length];
      img.alt = name;

      const cap = document.createElement("figcaption");
      cap.textContent = name;

      card.tabIndex = 0;
      card.setAttribute("role", "button");
      card.setAttribute("aria-label", `Visa större bild för ${name}`);
      card.addEventListener("click", () => {
        lightboxImage.src = img.currentSrc || img.src;
        lightboxImage.alt = name;
        lightboxTitle.textContent = `${i + 1}. ${name}`;
        lightbox.showModal();
      });
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          card.click();
        }
      });

      card.appendChild(img);
      card.appendChild(cap);
      gallery.appendChild(card);
    });

    closeLightboxBtn.addEventListener("click", () => lightbox.close());
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) lightbox.close();
    });
  </script>
</body>
</html>
