<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bilar | Samuel</title>
  <meta name="description" content="Samuels bilsida.">
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <div class="page">
    <header class="hero">
      <a class="back" href="/samuel/">Tillbaka</a>
      <h1>Bilar</h1>
      <p>100 supersportbilar.</p>
    </header>

    <main class="gallery" id="supercar-gallery"></main>
  </div>

  <dialog id="car-lightbox" class="car-lightbox">
    <article class="car-detail">
      <img id="lightbox-image" src="" alt="">
      <section class="car-stats">
        <h2 id="lightbox-title"></h2>
        <ul id="lightbox-stats"></ul>
      </section>
    </article>
  </dialog>

  <script>
    const gallery = document.getElementById("supercar-gallery");
    const lightbox = document.getElementById("car-lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const lightboxTitle = document.getElementById("lightbox-title");
    const lightboxStats = document.getElementById("lightbox-stats");

    function renderCards(cars) {
      gallery.innerHTML = "";
      cars.forEach((car) => {
        const card = document.createElement("figure");
        card.className = "card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.decoding = "async";
        img.src = car.local_image || "/assets/batmobile-concept-car-with-neon-lights.jpg";
        img.alt = car.name;

        const cap = document.createElement("figcaption");
        cap.textContent = car.name;

        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", `Visa större bild för ${car.name}`);
        card.addEventListener("click", () => {
          lightboxImage.src = img.currentSrc || img.src;
          lightboxImage.alt = car.name;
          lightboxTitle.textContent = car.name;
          lightboxStats.innerHTML = `
            <li><strong>År:</strong> <span>${car.stats?.year ?? "-"}</span></li>
            <li><strong>Vikt:</strong> <span>${car.stats?.weight_kg ?? "-"} kg</span></li>
            <li><strong>Motor:</strong> <span>${car.stats?.engine ?? "-"}</span></li>
            <li><strong>Toppfart:</strong> <span>${car.stats?.top_speed_kmh ?? "-"} km/h</span></li>
            <li><strong>0-100:</strong> <span>${car.stats?.zero_to_100_s ?? "-"} s</span></li>
          `;
          lightbox.showModal();
        });
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            card.click();
          }
        });

        card.appendChild(img);
        card.appendChild(cap);
        gallery.appendChild(card);
      });
    }

    async function init() {
      try {
        const res = await fetch("/assets/supercar-library/cars.json");
        if (!res.ok) throw new Error("No library");
        const data = await res.json();
        renderCards(data.cars || []);
      } catch (err) {
        console.error(err);
        renderCards([]);
      }
    }

    lightboxImage.addEventListener("click", () => lightbox.close());
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) lightbox.close();
    });
    init();
  </script>
</body>
</html>
