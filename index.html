<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alard</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, system-ui, sans-serif;
      background: radial-gradient(circle at 20% 20%, #133a70 0%, #071126 55%, #030914 100%);
      color: #e8f0ff;
    }
    .card {
      width: min(92vw, 560px);
      border: 1px solid rgba(142, 183, 255, .35);
      border-radius: 16px;
      padding: 28px;
      background: rgba(8, 21, 44, .72);
      box-shadow: 0 16px 44px rgba(0, 0, 0, .35);
      text-align: center;
    }
    a {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      color: #021722;
      font-weight: 700;
      background: linear-gradient(180deg, #79f28a, #4ed168);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Alard</h1>
    <p>Öppna Liftlog här:</p>
    <a href="/liftlog/">Gå till Liftlog</a>
  </main>
</body>
</html>
